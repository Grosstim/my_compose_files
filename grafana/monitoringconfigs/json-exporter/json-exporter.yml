---
modules:
  apvgk:
    metrics:
    #ШКАФ СВК
    - name: cabinet_temperature
      path: '{ $.cabinet.1.state[*].cabinet_temperature }'
      help: Температура шкафа
      valuetype: value

    - name: cabinet_humidity
      path: '{ $.cabinet.1.state[*].cabinet_humidity }'
      help: Влажность шкафа
      valuetype: value

    - name: input_voltage
      path: '{ $.cabinet.1.state[*].input_voltage }'
      help: Входное напряжение
      valuetype: value

    - name: control_cabinet_open
      path: '{ $.cabinet.1.state[*].control_cabinet_open }'
      help: Шкаф открыт или нет
      valuetype: boolean

    #СИЛОПРИЕМНЫЕ МОДУЛИ0
    ##ПЕРВЫЙ ДАТЧИК
    - name: datchik_1_canal_1_2
      path: '{ $.controller_pds.1.status[0].zero_code[0] }'
      help: Силоприемный модуль 1 канал 1+2
      valuetype: value
    
    - name: datchik_1_canal_3_4
      path: '{ $.controller_pds.1.status[0].zero_code[1] }'
