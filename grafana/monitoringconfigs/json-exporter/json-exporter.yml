    #СЕРВЕР СВК
    - name: cpu_temperature
      path: '{ $.server.stolb-db.cpu[0].cpu_temperature.Package\ id\ 0 }'
      help: Температура процессора
      valuetype: value

    - name: cpu_usage
      path: '{ $.server.stolb-db.cpu[0].cpu_usage.tot }'
      help: Использование процессора в %
      valuetype: value 

    - name: ram_usage
      path: '{ $.server.stolb-db.cpu[0].ram_usage }'
      help: Использование оператвной в %
      valuetype: value 

    - name: hdd_free_space_gb
      path: '{ $.server.stolb-db.hdd[0].hdd_free_space_gb.ROOT }'
      help: Свободное место на диске  HDD в ГБ
      valuetype: value 

